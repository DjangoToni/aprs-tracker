title: APRS Monitor
views:
  - title: Übersicht
    path: aprs-monitor
    icon: mdi:radio-tower
    cards:
      - type: entities
        title: Kontrollzentrum
        show_header_toggle: false
        entities:
          - binary_sensor.REPLACE_WITH_API_CONNECTED
          - sensor.REPLACE_WITH_OVERALL_STATUS
          - sensor.REPLACE_WITH_LAST_SUCCESSFUL_UPDATE
          - button.REPLACE_WITH_REFRESH
      - type: entities
        title: Station 1
        show_header_toggle: false
        entities:
          - sensor.REPLACE_WITH_STATION_STATUS
          - sensor.REPLACE_WITH_SPEED
          - sensor.REPLACE_WITH_ALTITUDE
          - sensor.REPLACE_WITH_COURSE_DIRECTION
          - sensor.REPLACE_WITH_DISTANCE_FROM_HOME
          - sensor.REPLACE_WITH_POSITION_AGE
          - binary_sensor.REPLACE_WITH_MOVING
          - binary_sensor.REPLACE_WITH_NEAR_HOME

  - title: Zonen
    path: aprs-zones
    icon: mdi:map-marker-radius
    cards:
      - type: entities
        title: Letzte Stationsereignisse
        show_header_toggle: false
        entities:
          - event.REPLACE_WITH_FIRST_STATION_ACTIVITY
          - event.REPLACE_WITH_SECOND_STATION_ACTIVITY
          - event.REPLACE_WITH_THIRD_STATION_ACTIVITY
      - type: map
        title: APRS-Zonen
        auto_fit: true
        fit_zones: true
        cluster: false
        theme_mode: auto
        entities:
          - entity: device_tracker.REPLACE_WITH_FIRST_TRACKER
            label_mode: state
          - entity: device_tracker.REPLACE_WITH_SECOND_TRACKER
            label_mode: state
          - entity: device_tracker.REPLACE_WITH_THIRD_TRACKER
            label_mode: state
          - entity: zone.home
            focus: false
          - entity: zone.REPLACE_WITH_FIRST_ZONE
            focus: false
          - entity: zone.REPLACE_WITH_SECOND_ZONE
            focus: false

  - title: Symbole
    path: aprs-symbols
    icon: mdi:map-marker-multiple
    cards:
      - type: map
        title: APRS-Symbole
        auto_fit: true
        fit_zones: true
        cluster: false
        theme_mode: auto
        entities:
          - entity: device_tracker.REPLACE_WITH_FIRST_TRACKER
            label_mode: icon
          - entity: device_tracker.REPLACE_WITH_SECOND_TRACKER
            label_mode: icon
          - entity: device_tracker.REPLACE_WITH_THIRD_TRACKER
            label_mode: icon
          - entity: zone.home
            focus: false

  - title: Telemetrie
    path: aprs-telemetry
    icon: mdi:speedometer
    cards:
      - type: map
        title: APRS-Telemetrie
        auto_fit: true
        fit_zones: true
        cluster: false
        theme_mode: auto
        entities:
          - entity: device_tracker.REPLACE_WITH_FIRST_TRACKER
            label_mode: attribute
            attribute: map_label
          - entity: device_tracker.REPLACE_WITH_SECOND_TRACKER
            label_mode: attribute
            attribute: map_label
          - entity: device_tracker.REPLACE_WITH_THIRD_TRACKER
            label_mode: attribute
            attribute: map_label
          - entity: zone.home
            focus: false

  - title: Verlauf
    path: aprs-history
    icon: mdi:map-clock
    cards:
      - type: map
        title: APRS-Verlauf – 24 Stunden
        hours_to_show: 24
        auto_fit: true
        fit_zones: true
        cluster: false
        theme_mode: auto
        entities:
          - entity: device_tracker.REPLACE_WITH_FIRST_TRACKER
            label_mode: icon
          - entity: device_tracker.REPLACE_WITH_SECOND_TRACKER
            label_mode: icon
          - entity: device_tracker.REPLACE_WITH_THIRD_TRACKER
            label_mode: icon
          - entity: zone.home
            focus: false
