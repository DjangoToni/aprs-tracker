name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Lint
        run: python -m ruff check .
      - name: Test map card
        run: node --test tests/map-card.test.mjs
      - name: Test
        run: >-
          python -m pytest -o asyncio_mode=auto
          --cov=custom_components.aprs_monitor --cov-report=term-missing

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hacs/action@main
        with:
          category: integration
          ignore: brands description issues topics
