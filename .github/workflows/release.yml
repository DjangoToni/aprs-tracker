name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt
      - name: Lint
        run: python -m ruff check .
      - name: Test
        run: >-
          python -m pytest -o asyncio_mode=auto
          --cov=custom_components.aprs_monitor --cov-report=term-missing
      - name: Build deterministic release archives
        run: >-
          python script/build_release.py
          --expected-version "${GITHUB_REF_NAME}"
          --output-dir dist
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" dist/*
          --verify-tag --generate-notes
          --title "APRS Monitor ${GITHUB_REF_NAME#v}"
